<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}StudyFlow{% endblock %}</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500;700&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>

<div class="app-shell">
    <aside class="sidebar">
        <div>
            <div class="sidebar-logo">
                <span class="logo-icon">◈</span>
                <span class="logo-text">StudyFlow</span>
            </div>

            <nav class="sidebar-nav">
                <a href="#" onclick="switchTab('overview','Dashboard'); return false;" class="nav-item active" data-nav="overview">
                    <span>📊</span>
                    <span>Dashboard</span>
                </a>

                <a href="#" onclick="switchTab('tasks','Tasks'); return false;" class="nav-item" data-nav="tasks">
                    <span>📋</span>
                    <span>Tasks</span>
                </a>

                <a href="#" onclick="switchTab('goals','Goals'); return false;" class="nav-item" data-nav="goals">
                    <span>🎯</span>
                    <span>Goals</span>
                </a>

                <a href="#" onclick="switchTab('sessions','Sessions'); return false;" class="nav-item" data-nav="sessions">
                    <span>⏱</span>
                    <span>Sessions</span>
                </a>
            </nav>
        </div>

        <div class="sidebar-footer">
            <div class="user-chip">
                <div class="user-avatar">
                    {{ current_user.name[0].upper() if current_user.is_authenticated else 'U' }}
                </div>

                <div class="user-info">
                    <span class="user-name">
                        {{ current_user.name if current_user.is_authenticated else 'User' }}
                    </span>
                    <span class="user-role">Student</span>
                </div>
            </div>

            <div class="sidebar-actions">
                <button class="theme-toggle" id="theme-toggle" type="button">
                    🌙 Theme
                </button>

                <a href="{{ url_for('logout') }}" class="logout-btn" title="Logout">
                    🚪 Logout
                </a>
            </div>
        </div>
    </aside>

    <main class="main-content">
        {% block content %}{% endblock %}
    </main>
</div>

<script src="{{ url_for('static', filename='app.js') }}"></script>
</body>
</html>
